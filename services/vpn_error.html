<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conexión Requerida - Zammad SLA</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #334155;
        }
        .card {
            background: white;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border-top: 6px solid #0f172a;
        }
        .logo {
            height: 70px;
            margin-bottom: 30px;
            /* Si tu logo es blanco y necesita fondo oscuro, descomenta esto: */
            /* background-color: #0f172a; padding: 10px; border-radius: 8px; */
        }
        h1 {
            color: #0f172a;
            margin: 0 0 15px 0;
            font-size: 1.6rem;
            font-weight: 700;
        }
        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 35px;
            font-size: 1.05rem;
        }
        .btn {
            background-color: #0ea5e9;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s, transform 0.1s;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background-color: #0284c7; transform: translateY(-1px); }
        .icon { font-size: 3.5rem; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <img src="img/logo.png" alt="Logo Empresa" class="logo">
        <div class="icon">🔒</div>
        <h1>Conexión VPN Requerida</h1>
        <p>
            No se pudo establecer conexión con la base de datos de Zammad.
            <br><br>
            Por favor, asegúrate de que tu <strong>VPN corporativa</strong> esté activa y conectada para acceder a este servicio.
        </p>
        <a href="/" class="btn">🔄 Reintentar Conexión</a>
    </div>
</body>
</html>
